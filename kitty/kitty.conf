# Font
font_family Maple Mono Nf
font_size 12.0

# Theme
foreground #f8f8f2
background #000000
url_color #d65c9d

# Cursor
#cursor #44475a
cursor #ffffff

term xterm-256color
background_opacity 1 
background_blur 1

color0  #000000
color8  #44475a

color1  #ff5555
color9  #ff5555

color2  #50fa7b
color10 #50fa7b

color3  #f1fa8c
color11 #f1fa8c

color4  #2eb3f0
color12 #2eb3f0

color5  #ff79c6
color13 #ff79c6

color6  #8be9fd
color14 #8be9fd

color7  #bbbbbb
color15 #ffffff
hide_window_decorations yes
remember_window_size no
initial_window_width  1900
initial_window_height 1060
cursor_stop_blinking_after 0.0
cursor_trail 70
cursor_trail_start_threshold 0
shell_integration no-cursor
cursor_trail_decay 0.10 0.15
cursor_shape block
cursor_blink true
disable_ligatures never
enable_audio_bell no
window_padding_width 5

map ctrl+shift+t send_text normal tmux\r
map ctrl+shift+a send_text all /home/m3lk0r/.config/tmux-sessionizer.sh\r
